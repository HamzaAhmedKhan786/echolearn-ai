name: echolearn_ai
description: Offline AI-powered document reader and study assistant.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  device_preview: ^1.3.1
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/
