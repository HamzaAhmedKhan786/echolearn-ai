name: Release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  desktop-linux:
    name: Desktop Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri Linux bundle
        run: npm run tauri:build

      - name: Upload Linux desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echolearn-desktop-linux
          path: desktop/app/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop/app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri macOS bundle
        run: npm run tauri:build

      - name: Upload macOS desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echolearn-desktop-macos
          path: desktop/app/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

  ios:
    name: iOS no-codesign app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile/flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Disable experimental Flutter Swift Package Manager
        run: |
          flutter config --no-enable-swift-package-manager
          flutter config --list

      - name: Verify iOS workspace files
        run: |
          pwd
          ls -la ios
          test -f ios/Runner.xcworkspace/contents.xcworkspacedata
          test -f ios/Runner.xcodeproj/project.pbxproj

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build iOS app without code signing
        run: flutter build ios --release --no-codesign

      - name: Package iOS app artifact
        run: ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app build/ios/echolearn-ios-no-codesign.zip

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: echolearn-ios-no-codesign
          path: mobile/flutter_app/build/ios/echolearn-ios-no-codesign.zip
          if-no-files-found: error
